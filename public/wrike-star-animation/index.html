<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Animation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f5fa;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .star-box {
      position: relative;
      width: 530px;
      height: 675px;
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      isolation: isolate;
    }

    /* Soft white wash on top half — gives the design's white→green vertical fade */
    .star-box::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0) 55%);
    }

    /* Moving gradient layer — 9 radial blobs that wander via springs */
    .gradient-map {
      position: absolute;
      inset: -10%;
      z-index: 1;
      pointer-events: none;
      filter: blur(70px);
      opacity: 0.9;
      background-image:
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c0-dx, 0px)) calc(var(--map-y, 50%) + var(--c0-dy, 0px)), #aaff00, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c1-dx, 0px)) calc(var(--map-y, 50%) + var(--c1-dy, 0px)), #00e05c, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c2-dx, 0px)) calc(var(--map-y, 50%) + var(--c2-dy, 0px)), #00e05c, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c3-dx, 0px)) calc(var(--map-y, 50%) + var(--c3-dy, 0px)), #00ff2b, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c4-dx, 0px)) calc(var(--map-y, 50%) + var(--c4-dy, 0px)), #00ff2b, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c5-dx, 0px)) calc(var(--map-y, 50%) + var(--c5-dy, 0px)), #aaff00, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c6-dx, 0px)) calc(var(--map-y, 50%) + var(--c6-dy, 0px)), #00e05c, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c7-dx, 0px)) calc(var(--map-y, 50%) + var(--c7-dy, 0px)), #00ff2b, transparent),
        radial-gradient(circle 390px at calc(var(--map-x, 50%) + var(--c8-dx, 0px)) calc(var(--map-y, 50%) + var(--c8-dy, 0px)), #00e05c, transparent);
    }

    /* Foreground star + decorative shapes */
    .star-foreground {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>

  <div class="star-box" id="starBox">
    <div class="gradient-map" id="gradMap"></div>
    <img class="star-foreground" src="star-foreground.png" alt="">
  </div>

  <script>
    /* ── Constants ── */
    const BOX_W = 530;
    const BOX_H = 675;

    /* ── Spring (lifted from /hp interaction animation/index.html) ── */
    class Spring {
      constructor(k, d) { this.k = k; this.d = d; this.value = 0; this.target = 0; this.velocity = 0; }
      setTarget(t) { this.target = t; }
      tick(dt) {
        const f = -this.k * (this.value - this.target) - this.d * this.velocity;
        this.velocity += f * dt;
        this.value    += this.velocity * dt;
      }
    }

    /* ── Gradient blob state ── */
    const mapX = new Spring(13, 6);
    const mapY = new Spring(13, 6);
    /* Bias the resting center slightly below middle — matches the Figma's bottom-heavy gradient */
    mapX.value = mapX.target = BOX_W / 2;
    mapY.value = mapY.target = BOX_H * 0.62;

    const SPOTS = Array.from({ length: 9 }, (_, i) => {
      const sprX = new Spring(10, 4);
      const sprY = new Spring(10, 4);
      const a = (i / 9) * Math.PI * 2;
      const r = 35 + Math.random() * 25;
      sprX.value = sprX.target = Math.cos(a) * r;
      sprY.value = sprY.target = Math.sin(a) * r;
      return { sprX, sprY, nextRetarget: 0 };
    });

    /* ── DOM refs ── */
    const box     = document.getElementById('starBox');
    const gradMap = document.getElementById('gradMap');

    /* ── Hover state ── */
    let hoverPoint = null; /* {x, y} in box-local coords, or null */

    box.addEventListener('mousemove', (e) => {
      const rect = box.getBoundingClientRect();
      hoverPoint = {
        x: ((e.clientX - rect.left) / rect.width)  * BOX_W,
        y: ((e.clientY - rect.top)  / rect.height) * BOX_H,
      };
    });
    box.addEventListener('mouseleave', () => { hoverPoint = null; });

    /* ── RAF loop ── */
    let lastT = performance.now();
    function loop(now) {
      const dt  = Math.min((now - lastT) / 1000, 1 / 30);
      lastT = now;
      const t   = now / 1000;
      const TAU = Math.PI * 2;

      /* Idle wander — slow Lissajous around the resting center, biased low */
      const cx = BOX_W / 2;
      const cy = BOX_H * 0.62;
      const wx = cx + Math.sin(t * 0.13  * TAU) * 90;
      const wy = cy - Math.sin(t * 0.097 * TAU + 1.3) * 70;

      if (hoverPoint) {
        /* Pull gradient center toward cursor — same blend as the source file */
        mapX.setTarget(wx * 0.35 + hoverPoint.x * 0.65);
        mapY.setTarget(wy * 0.35 + hoverPoint.y * 0.65);
      } else {
        mapX.setTarget(wx);
        mapY.setTarget(wy);
      }

      mapX.tick(dt);
      mapY.tick(dt);
      gradMap.style.setProperty('--map-x', `${mapX.value.toFixed(1)}px`);
      gradMap.style.setProperty('--map-y', `${mapY.value.toFixed(1)}px`);

      /* Wandering blobs — re-targeted at randomized intervals */
      const amp = 165 + Math.sin(t * 0.11 * TAU + 0.7) * 30;
      SPOTS.forEach((s, i) => {
        if (t > s.nextRetarget) {
          s.sprX.setTarget((Math.random() - 0.5) * 2 * amp);
          s.sprY.setTarget((Math.random() - 0.5) * 2 * amp);
          s.nextRetarget = t + 3 + Math.random() * 5;
        }
        s.sprX.tick(dt);
        s.sprY.tick(dt);
        gradMap.style.setProperty(`--c${i}-dx`, `${s.sprX.value.toFixed(1)}px`);
        gradMap.style.setProperty(`--c${i}-dy`, `${s.sprY.value.toFixed(1)}px`);
      });

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
