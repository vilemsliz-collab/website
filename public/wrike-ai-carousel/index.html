<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wrike AI Carousel</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }

    .viewport {
      width: 1060px; height: 1350px;
      overflow: hidden;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }

    .stack {
      position: relative;
      width: 960px;
      height: 600px;
    }

    .card {
      position: absolute;
      top: 0; left: 0;
      width: 960px;
      height: 540px;
      border-radius: 16px;
      overflow: hidden;
      /* hidden default state */
      transform: translateY(90px) scale(0.78);
      filter: blur(8px);
      opacity: 0;
      z-index: 0;
      will-change: transform, filter, opacity;
    }

    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stack" id="stack">
      <div class="card"><img src="image 2.png" alt=""></div>
      <div class="card"><img src="image 3.png" alt=""></div>
      <div class="card"><img src="image 4.png" alt=""></div>
      <div class="card"><img src="image 5.png" alt=""></div>
      <div class="card"><img src="image 6.png" alt=""></div>
      <div class="card"><img src="image 7.png" alt=""></div>
    </div>
  </div>

  <script>
    const cards = [...document.querySelectorAll('.card')];
    const N = cards.length;
    const TRANS_MS  = 520;
    const PAUSE_MS  = 2000;

    // spring: quick start, smooth settle, tiny overshoot (~1.04) — Apple feel
    const SPRING = CSS.supports('animation-timing-function', 'linear(0, 1)')
      ? 'linear(0,0.007,0.029 2.2%,0.118,0.237 7.1%,0.618 13.4%,0.829 17.3%,0.949 20.8%,1.001,1.034,1.052,1.056 26.7%,1.05,1.04 31.2%,1.013,1.004 37.2%,0.998,0.996 42%,0.998,1.001 48.5%,1.003,1.002,1)'
      : 'cubic-bezier(0.22, 1.1, 0.36, 1)';

    // [translateY px, scale, blur px, opacity, z-index]
    const STACK = [
      [0,  1.00, 0, 1,    6],  // front — sharp, full size
      [50, 0.88, 3, 1,    5],  // mid   — slight blur, slightly smaller
      [90, 0.78, 8, 0.8,  4],  // back  — soft blur, noticeably smaller
    ];

    function set(card, pos, animate) {
      card.style.transition = animate
        ? `transform ${TRANS_MS}ms ${SPRING}, filter ${TRANS_MS}ms ease, opacity ${Math.round(TRANS_MS * 0.55)}ms ease`
        : 'none';

      if (pos === null) {
        const [ty, sc, bl] = STACK[2];
        card.style.transform = `translateY(${ty}px) scale(${sc})`;
        card.style.filter    = `blur(${bl}px)`;
        card.style.opacity   = '0';
        card.style.zIndex    = '0';
      } else {
        const [ty, sc, bl, op, zi] = STACK[pos];
        card.style.transform = `translateY(${ty}px) scale(${sc})`;
        card.style.filter    = bl > 0 ? `blur(${bl}px)` : 'none';
        card.style.opacity   = String(op);
        card.style.zIndex    = String(zi);
      }
    }

    let front = 0;

    function layout(animate) {
      for (let i = 0; i < N; i++) {
        const rel = ((i - front) + N) % N;
        set(cards[i], rel < 3 ? rel : null, animate);
      }
    }

    function advance() {
      const exitCard = cards[front];

      // exit: fade out in place with subtle scale-up and blur — crossfade feel
      exitCard.style.transition = `opacity ${Math.round(TRANS_MS * 0.55)}ms ease, transform ${TRANS_MS}ms ${SPRING}, filter ${Math.round(TRANS_MS * 0.6)}ms ease`;
      exitCard.style.opacity    = '0';
      exitCard.style.transform  = 'translateY(0px) scale(1.04)';
      exitCard.style.filter     = 'blur(6px)';
      exitCard.style.zIndex     = '9';

      front = (front + 1) % N;

      for (let i = 0; i < N; i++) {
        if (cards[i] === exitCard) continue;
        const rel = ((i - front) + N) % N;
        set(cards[i], rel < 3 ? rel : null, true);
      }

      setTimeout(() => set(exitCard, null, false), TRANS_MS + 80);
    }

    layout(false);
    setInterval(advance, PAUSE_MS + TRANS_MS);
  </script>
</body>
</html>
